steps:
  # Step 1: DevOps review of Dockerfile and pipeline config (not app code)
  - name: python:3.12-slim
    id: pipeline-review
    entrypoint: bash
    env:
      - 'GOOGLE_CLOUD_PROJECT=iam-ci-demo-477311'
      - 'GOOGLE_CLOUD_LOCATION=us-central1'
    args:
      - -c
      - |
        pip install --quiet google-genai
        git fetch origin main || true
        DIFF=$$(git diff origin/main...HEAD -- Dockerfile cloudbuild.yaml 2>/dev/null || echo "")
        if [ -z "$$DIFF" ]; then echo "No infra changes to review."; exit 0; fi
        cat > review.py << 'PYEOF'
        import os
        from google import genai

        diff = os.environ["DIFF_CONTENT"]
        client = genai.Client(
            vertexai=True,
            project=os.environ["GOOGLE_CLOUD_PROJECT"],
            location=os.environ["GOOGLE_CLOUD_LOCATION"],
        )
        prompt = f"""Review this Dockerfile/cloudbuild.yaml diff for DevOps concerns:
        containers running as root, missing resource limits, hardcoded secrets,
        overly broad IAM roles. Start reply with SEVERITY: NONE/LOW/MEDIUM/HIGH/CRITICAL

        Diff:
        {diff}
        """
        response = client.models.generate_content(model="gemini-2.5-flash", contents=prompt)
        print(response.text)
        with open("review.txt", "w") as f:
            f.write(response.text)
        PYEOF
        DIFF_CONTENT="$$DIFF" python3 review.py
        grep -q "SEVERITY: CRITICAL" review.txt && exit 1 || exit 0

  # Step 2: build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/crash-repo/crash-demo', '.']
    waitFor: ['pipeline-review']

  # Step 3: push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/crash-repo/crash-demo']
    waitFor: ['build-image']

  # Step 4: deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy
    entrypoint: gcloud
    args: ['run', 'deploy', 'crash-demo', '--image=us-central1-docker.pkg.dev/$PROJECT_ID/crash-repo/crash-demo', '--region=us-central1', '--allow-unauthenticated']
    waitFor: ['push-image']

  # Step 5: smoke test the live service
  - name: 'gcr.io/cloud-builders/gcloud'
    id: smoke-test
    entrypoint: bash
    args:
      - -c
      - |
        URL=$$(gcloud run services describe crash-demo --region=us-central1 --format='value(status.url)')
        curl -sf -o /dev/null -w "%{http_code}" "$$URL" | grep -q 200 && echo "Service healthy" || (echo "Service check failed" && exit 1)
    waitFor: ['deploy']

  # Step 6a: fetch recent logs using gcloud
  - name: 'gcr.io/cloud-builders/gcloud'
    id: fetch-logs
    entrypoint: bash
    args:
      - -c
      - |
        sleep 30
        gcloud logging read 'resource.type="cloud_run_revision" AND resource.labels.service_name="crash-demo" AND severity>=WARNING' --limit=50 --format='value(textPayload)' --freshness=10m > /workspace/logs.txt
        echo "Log lines fetched: $$(wc -l < /workspace/logs.txt)"
    waitFor: ['smoke-test']

  # Step 6b: summarize logs using Gemini directly via google-genai SDK
  - name: python:3.12-slim
    id: check-logs
    entrypoint: bash
    env:
      - 'GOOGLE_CLOUD_PROJECT=iam-ci-demo-477311'
      - 'GOOGLE_CLOUD_LOCATION=us-central1'
    args:
      - -c
      - |
        pip install --quiet google-genai
        if [ ! -s /workspace/logs.txt ]; then echo "No warnings or errors."; exit 0; fi
        cat > summarize.py << 'PYEOF'
        import os
        from google import genai

        with open("/workspace/logs.txt") as f:
            logs = f.read()

        client = genai.Client(
            vertexai=True,
            project=os.environ["GOOGLE_CLOUD_PROJECT"],
            location=os.environ["GOOGLE_CLOUD_LOCATION"],
        )
        prompt = f"Summarize anomaly patterns in these Cloud Run logs in 3 short bullets.\n\nLogs:\n{logs}"
        response = client.models.generate_content(model="gemini-2.5-flash", contents=prompt)
        print(response.text)
        PYEOF
        python3 summarize.py
    waitFor: ['fetch-logs']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/crash-repo/crash-demo'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s